<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRM Leads</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
<style>
:root{
    --primary:#1f3c88;
    --bg:#f4f6f9;
    --card:#ffffff;
    --text:#333;
    --border:#e0e0e0;
}

.dark{
    --bg:#121212;
    --card:#1e1e1e;
    --text:#eee;
    --border:#333;
}

body{
    margin:0;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    transition: background 0.3s, color 0.3s;
}

.navnames{
    font-size:larger;
    font-weight:500;
}

/* Sidebar */
.sidebar{
    width:230px;
    background:var(--primary);
    color:#fff;
    padding:20px;
    height:100vh;
    overflow-y:auto;
}

/* Logo Upload */
.logo{
    text-align:center;
    margin-bottom:30px;
}
.logo img{
    max-width:180px;
    display:none;
    border-radius:8px;
    margin-bottom:10px;
}
.logo-upload{
    background:#fff;
    color:#333;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
    font-weight:bold;
    transition:all 0.3s;
}
.logo-upload:hover{
    transform:scale(1.05);
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.menu div{
    padding:12px;
    margin:8px 0;
    border-radius:6px;
    cursor:pointer;
    transition:all 0.2s;
}
.menu div:hover{
    background:rgba(255,255,255,0.2);
    transform:translateX(5px);
}

/* Main */
.main{
    flex:1;
    padding:25px;
    overflow-y:auto;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

h2{
    margin:0;
}

button{
    padding:8px 12px;
    margin-left:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:var(--primary);
    color:white;
    transition:all 0.3s;
    font-weight:500;
}

button:hover{
    opacity:0.9;
    transform:translateY(-2px);
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

/* Card */
.card{
    background:var(--card);
    border-radius:10px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    border:1px solid var(--border);
}

/* Upload Section */
.upload-section{
    margin-bottom:20px;
    padding:15px;
    background:var(--card);
    border:2px dashed var(--border);
    border-radius:8px;
    text-align:center;
}

.file-input-wrapper{
    position:relative;
    display:inline-block;
}

.file-input-wrapper input[type="file"]{
    display:none;
}

.file-btn{
    padding:10px 20px;
    background:var(--primary);
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.file-btn:hover{
    opacity:0.9;
}

#fileName{
    margin-left:10px;
    color:#666;
    font-size:14px;
}

.dark #fileName{
    color:#aaa;
}

/* Search and Pagination Bar */
.controls-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
    gap:15px;
    flex-wrap:wrap;
}

.search-box{
    flex:1;
    min-width:200px;
}

.search-box input{
    width:100%;
    padding:10px;
    border:1px solid var(--border);
    border-radius:6px;
    background:var(--card);
    color:var(--text);
    font-size:14px;
}

.search-box input::placeholder{
    color:#999;
}

.pagination{
    display:flex;
    gap:5px;
    align-items:center;
}

.pagination button{
    padding:6px 12px;
    margin-left:0;
    font-size:12px;
}

.pagination .page-info{
    padding:6px 12px;
    background:var(--card);
    border-radius:6px;
    border:1px solid var(--border);
    font-size:13px;
    font-weight:500;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    padding:12px;
    text-align:left;
    border-bottom:1px solid var(--border);
}

th{
    background:var(--primary);
    color:#fff;
    font-weight:600;
    position:sticky;
    top:0;
}

tr:hover{
    background:rgba(31,60,136,0.05);
}

.dark tr:hover{
    background:rgba(255,255,255,0.05);
}

tr:nth-child(even){
    background:var(--bg);
}

/* Theme Panel */
#themePanel{
    position:fixed;
    top:60px;
    right:20px;
    background:var(--card);
    padding:15px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    display:none;
    z-index:999;
    border:1px solid var(--border);
}

.theme-grid{
    display:grid;
    grid-template-columns:repeat(5,30px);
    gap:10px;
    margin-top:10px;
}

.theme-grid div{
    width:30px;
    height:30px;
    border-radius:50%;
    cursor:pointer;
    transition:all 0.2s;
    border:2px solid transparent;
}

.theme-grid div:hover{
    transform:scale(1.15);
    border-color:#333;
}

/* Empty State */
.empty-state{
    text-align:center;
    padding:40px;
    color:#999;
}

.empty-state svg{
    width:60px;
    height:60px;
    margin-bottom:15px;
    opacity:0.5;
}

/* Status Badge */
.status-badge{
    display:inline-block;
    padding:4px 8px;
    border-radius:4px;
    font-size:12px;
    font-weight:600;
}

.status-new{
    background:#c8e6c9;
    color:#2e7d32;
}

.status-followup{
    background:#fff9c4;
    color:#f57f17;
}

.status-closed{
    background:#ffccbc;
    color:#d84315;
}

.status-qualified{
    background:#bbdefb;
    color:#1565c0;
}

.dark .status-new{
    background:rgba(46,125,50,0.3);
}

.dark .status-followup{
    background:rgba(245,127,23,0.3);
}

.dark .status-closed{
    background:rgba(216,67,21,0.3);
}

.dark .status-qualified{
    background:rgba(21,101,192,0.3);
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">
        <img id="logoPreview">
        <label class="logo-upload" for="logoInput">Upload Logo</label>
        <input type="file" id="logoInput" hidden>
    </div>

    <div class="menu">
        <div class="navnames">Leads</div>
        <div class="navnames">Dashboard</div>
        <div class="navnames">Reports</div>
        <div class="navnames">Callbacks</div>
        <div class="navnames">Workflows</div>
        <div class="navnames">Account</div>
        <div class="navnames">Custom</div>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <h2>Lead Information</h2>
        <div>
            <button onclick="toggleTheme()">🌙 Dark/Light</button>
            <button onclick="toggleThemePanel()">🎨 Themes</button>
        </div>
    </div>

    <!-- Excel Upload Section -->
    <div class="card upload-section">
        <div class="file-input-wrapper">
            <input type="file" id="excelInput" accept=".xlsx,.xls,.csv" onchange="handleFileUpload(event)">
            <button class="file-btn" onclick="document.getElementById('excelInput').click()">📤 Upload Excel File</button>
            <span id="fileName"></span>
        </div>
    </div>

    <!-- Search and Pagination -->
    <div class="card">
        <div class="controls-bar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search leads by name, phone, or status..." onkeyup="filterAndSearch()">
            </div>
            <div class="pagination">
                <button onclick="previousPage()">← Prev</button>
                <span class="page-info">
                    Page <span id="currentPage">1</span> of <span id="totalPages">1</span>
                </span>
                <button onclick="nextPage()">Next →</button>
            </div>
        </div>

        <!-- Table -->
        <table id="dataTable">
            <thead>
                <tr id="headerRow">
                    <th>Name</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="100%" style="text-align:center; padding:40px; color:#999;">
                        📁 Upload an Excel file to display data
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- THEME PANEL -->
<div id="themePanel">
    <h4 style="margin-top:0;">Select Theme</h4>
    <div class="theme-grid">
        <div onclick="setTheme('#1f3c88')" style="background:#1f3c88" title="Blue"></div>
        <div onclick="setTheme('#00695c')" style="background:#00695c" title="Teal"></div>
        <div onclick="setTheme('#6a1b9a')" style="background:#6a1b9a" title="Purple"></div>
        <div onclick="setTheme('#c62828')" style="background:#c62828" title="Red"></div>
        <div onclick="setTheme('#ef6c00')" style="background:#ef6c00" title="Orange"></div>
        <div onclick="setTheme('#283593')" style="background:#283593" title="Indigo"></div>
        <div onclick="setTheme('#00838f')" style="background:#00838f" title="Cyan"></div>
        <div onclick="setTheme('#37474f')" style="background:#37474f" title="Grey"></div>
        <div onclick="setTheme('#2e7d32')" style="background:#2e7d32" title="Green"></div>
        <div onclick="setTheme('#5d4037')" style="background:#5d4037" title="Brown"></div>
    </div>
</div>

<script>
// Global variables
let allData = [];
let filteredData = [];
let currentPage = 1;
const rowsPerPage = 10;

// Logo Upload Handler
const logoInput=document.getElementById("logoInput");
const logoPreview=document.getElementById("logoPreview");

logoInput.addEventListener("change",function(){
    const file=this.files[0];
    if(file){
        logoPreview.src=URL.createObjectURL(file);
        logoPreview.style.display="block";
        document.querySelector(".logo-upload").style.display="none";
    }
});

// Excel File Handler
function handleFileUpload(event) {
    const file = event.target.files[0];
    if(!file) return;

    document.getElementById("fileName").textContent = `✓ ${file.name}`;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type:'array'});
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(worksheet);
            
            if(jsonData.length === 0) {
                alert('No data found in the Excel file');
                return;
            }

            allData = jsonData;
            filteredData = [...allData];
            currentPage = 1;
            
            displayTable();
            updatePagination();
        } catch(error) {
            alert('Error reading file: ' + error.message);
        }
    };
    reader.readAsArrayBuffer(file);
}

// Display Table with Dynamic Headers
function displayTable() {
    if(allData.length === 0) {
        document.getElementById("headerRow").innerHTML = '<th>Name</th>';
        document.getElementById("tableBody").innerHTML = '<tr><td colspan="100%" style="text-align:center; padding:40px; color:#999;">📁 Upload an Excel file to display data</td></tr>';
        return;
    }

    // Get column headers from first row
    const headers = Object.keys(allData[0]);
    let headerHTML = '';
    headers.forEach(header => {
        headerHTML += `<th>${header}</th>`;
    });
    document.getElementById("headerRow").innerHTML = headerHTML;

    // Display paginated data
    const start = (currentPage - 1) * rowsPerPage;
    const end = start + rowsPerPage;
    const pageData = filteredData.slice(start, end);

    let tableHTML = '';
    pageData.forEach(row => {
        tableHTML += '<tr>';
        headers.forEach(header => {
            let cellValue = row[header] || '';
            
            // Apply status badge if Status column
            if(header.toLowerCase() === 'status') {
                const statusClass = `status-${cellValue.toLowerCase().replace(/\s+/g, '')}`;
                cellValue = `<span class="status-badge ${statusClass}">${cellValue}</span>`;
            }
            
            tableHTML += `<td>${cellValue}</td>`;
        });
        tableHTML += '</tr>';
    });

    document.getElementById("tableBody").innerHTML = tableHTML || '<tr><td colspan="100%" style="text-align:center; padding:20px;">No results found</td></tr>';
}

// Filter and Search
function filterAndSearch() {
    const searchTerm = document.getElementById("searchInput").value.toLowerCase();
    
    if(searchTerm === '') {
        filteredData = [...allData];
    } else {
        filteredData = allData.filter(row => {
            return Object.values(row).some(value => 
                String(value).toLowerCase().includes(searchTerm)
            );
        });
    }
    
    currentPage = 1;
    displayTable();
    updatePagination();
}

// Pagination
function updatePagination() {
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    document.getElementById("currentPage").textContent = currentPage;
    document.getElementById("totalPages").textContent = totalPages || 1;
}

function nextPage() {
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    if(currentPage < totalPages) {
        currentPage++;
        displayTable();
        updatePagination();
    }
}

function previousPage() {
    if(currentPage > 1) {
        currentPage--;
        displayTable();
        updatePagination();
    }
}

// Theme Functions
function toggleTheme(){
    document.body.classList.toggle("dark");
}

function toggleThemePanel(){
    const panel=document.getElementById("themePanel");
    panel.style.display=panel.style.display==="block"?"none":"block";
}

function setTheme(color){
    document.documentElement.style.setProperty('--primary',color);
}
</script>

</body>
</html>
